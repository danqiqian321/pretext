<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Danqi Qian - Creative Pond</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: white; touch-action: none; }
        canvas { display: block; }

        /* HARDENED MOBILE SCROLLBAR RULES */
        .settings-panel {
            overflow-y: scroll !important; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.7) rgba(0, 0, 0, 0.15);
        }

        .settings-panel::-webkit-scrollbar {
            width: 8px !important; 
            height: 8px !important;
            -webkit-appearance: none !important; 
            display: block !important; 
            background-color: rgba(0, 0, 0, 0.15); 
            border-radius: 10px;
        }

        .settings-panel::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.15); 
            border-radius: 10px;
            margin: 12px 0;
        }

        .settings-panel::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.7); 
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2); 
        }

        .settings-panel::-webkit-scrollbar-thumb:hover,
        .settings-panel::-webkit-scrollbar-thumb:active {
            background-color: rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useRef, useEffect, useState } = React;

        const DEFAULT_TEXT = `Danqi Qian is good at creating stuff. Go follow her X if you like this!`;

        function App() {
            const canvasRef = useRef(null);
            const [isPanelVisible, setIsPanelVisible] = useState(false);
            const [customText, setCustomText] = useState(DEFAULT_TEXT);
            const [inputValue, setInputValue] = useState(DEFAULT_TEXT);
            const [randomPhrases, setRandomPhrases] = useState('Follow @ohhdanqi !');
            const [randomPhrasesInput, setRandomPhrasesInput] = useState('Follow @ohhdanqi !');
            const randomPhrasesRef = useRef('');
            
            useEffect(() => { randomPhrasesRef.current = randomPhrases; }, [randomPhrases]);

            const [config, setConfig] = useState({
                lineHeight: 17.00,
                ambientSpeed: 0.20,
                ambientDrift: 4.10,
                causticIntensity: 0.70,
                rippleSpeed: 0.70,
                rippleStrength: 0.20
            });

            const configRef = useRef(config);
            useEffect(() => { configRef.current = config; }, [config]);

            const wordPositionsRef = useRef([]);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');

                const baseWordsRaw = (customText.trim() || DEFAULT_TEXT).split(' ').filter(w => w.length > 0);
                const phrases = randomPhrasesRef.current.split(',').map(p => p.trim()).filter(p => p.length > 0);

                let allWords = [...baseWordsRaw];
                if (phrases.length > 0) {
                    const poolSize = baseWordsRaw.length * 4;
                    let extended = [];
                    for (let i = 0; i < poolSize; i++) extended.push(baseWordsRaw[i % baseWordsRaw.length]);

                    const isSentenceEnd = w => /[.!?]$/.test(w);
                    let boundaries = [];
                    for (let i = 0; i < extended.length; i++) {
                        if (isSentenceEnd(extended[i])) boundaries.push(i + 1);
                    }
                    boundaries.unshift(0);

                    const shuffled = boundaries.sort(() => Math.random() - 0.5);
                    let pi = 0;
                    const insertions = [];
                    const step = Math.max(1, Math.floor(shuffled.length / (phrases.length * 3)));
                    for (let i = 0; i < shuffled.length && pi < phrases.length * 3; i += step) {
                        const phrase = phrases[pi % phrases.length];
                        const phraseWords = phrase.split(' ').filter(w => w.length > 0);
                        insertions.push({ index: shuffled[i], words: phraseWords });
                        pi++;
                    }
                    insertions.sort((a, b) => b.index - a.index);
                    for (const { index, words } of insertions) {
                        extended.splice(index, 0, ...words);
                    }
                    allWords = extended;
                }

                const doLayout = () => {
                    const width = window.innerWidth;
                    const height = window.innerHeight;
                    const dpr = window.devicePixelRatio || 1;
                    canvas.width = width * dpr;
                    canvas.height = height * dpr;
                    ctx.scale(dpr, dpr);
                    
                    // RESPONSIVE TEXT SIZING: Smaller text on mobile
                    const isMobile = width < 640;
                    const fontSize = isMobile ? 11 : 15;
                    ctx.font = `${fontSize}px "Times New Roman", serif`;
                    const spaceWidth = ctx.measureText(' ').width;

                    // Calculate words sizes based on current responsive font
                    const preparedWords = allWords.map(word => ({
                        text: word,
                        width: ctx.measureText(word).width,
                        spaceWidth: spaceWidth
                    }));

                    if (!preparedWords || preparedWords.length === 0) return;

                    const margin = isMobile ? 16 : 30;
                    // Scale down the line height on mobile based on font size reduction
                    const currentLineHeight = configRef.current.lineHeight * (isMobile ? 0.75 : 1);

                    let newPositions = [];
                    let passOffset = Math.floor(Math.random() * preparedWords.length);
                    let y = margin + (isMobile ? 10 : 20);
                    
                    while (y <= height - margin) {
                        let x = margin;
                        let lineWords = [];
                        let srcIdx = passOffset % preparedWords.length;
                        while (true) {
                            const word = preparedWords[srcIdx % preparedWords.length];
                            if (x + word.width > width - margin) break;
                            lineWords.push({ text: word.text, baseX: x, baseY: y, width: word.width });
                            x += word.width + word.spaceWidth;
                            srcIdx++;
                            if (lineWords.length > preparedWords.length * 10) break;
                        }
                        for (const lw of lineWords) newPositions.push(lw);
                        passOffset = srcIdx;
                        y += currentLineHeight;
                    }
                    wordPositionsRef.current = newPositions;
                };
                
                window.addEventListener('resize', doLayout);
                doLayout();
                return () => window.removeEventListener('resize', doLayout);
            }, [config.lineHeight, customText, randomPhrases]);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId, ripples = [], lastMouseX = -1000, lastMouseY = -1000;
                
                const createRipple = (x, y, strength, maxRadius) => ripples.push({ x, y, time: performance.now(), strength, maxRadius });
                
                const handleMouseMove = (e) => {
                    const dist = Math.hypot(e.clientX - lastMouseX, e.clientY - lastMouseY);
                    if (dist > 40) { createRipple(e.clientX, e.clientY, 8, 300); lastMouseX = e.clientX; lastMouseY = e.clientY; }
                };

                const handleClick = (e) => {
                    if (e.target.closest('.settings-panel')) return;
                    createRipple(e.clientX, e.clientY, 35, 1200);
                };

                const handleTouchMove = (e) => {
                    if (e.target.closest('.settings-panel')) return; 
                    const touch = e.touches[0];
                    const dist = Math.hypot(touch.clientX - lastMouseX, touch.clientY - lastMouseY);
                    if (dist > 40) { createRipple(touch.clientX, touch.clientY, 8, 300); lastMouseX = touch.clientX; lastMouseY = touch.clientY; }
                };

                const handleTouchStart = (e) => {
                    if (e.target.closest('.settings-panel')) return;
                    const touch = e.touches[0];
                    createRipple(touch.clientX, touch.clientY, 35, 1200);
                };

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('click', handleClick);
                canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
                canvas.addEventListener('touchstart', handleTouchStart, { passive: true });

                const render = () => {
                    const currentTime = performance.now(), cfg = configRef.current, dpr = window.devicePixelRatio || 1;
                    const w = canvas.width / dpr, h = canvas.height / dpr;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);
                    while (ripples.length > 0 && currentTime - ripples[0].time > 8000) ripples.shift();
                    
                    const positions = wordPositionsRef.current;
                    
                    // Maintain responsive font size in the render loop
                    const isMobile = window.innerWidth < 640;
                    const fontSize = isMobile ? 11 : 15;
                    ctx.font = `${fontSize}px "Times New Roman", serif`; 
                    ctx.textBaseline = 'middle';

                    for (let i = 0; i < positions.length; i++) {
                        let wp = positions[i], dx = 0, dy = 0, cIntensity = 0;
                        const timeScale = currentTime * 0.0004 * cfg.ambientSpeed;
                        let w1 = Math.sin(wp.baseX * 0.003 + timeScale);
                        let w2 = Math.sin((wp.baseX * 0.004 + wp.baseY * 0.003) - (timeScale * 1.25));
                        let w3 = Math.cos(wp.baseY * 0.002 + (timeScale * 1.5));
                        
                        cIntensity += Math.pow(Math.sin((w1+w2+w3) * 0.5), 4) * 1.2 * cfg.causticIntensity;
                        dx += w1 * 0.8 * cfg.ambientDrift; 
                        dy += w3 * 0.8 * cfg.ambientDrift;

                        for (let r of ripples) {
                            let dist = Math.hypot(wp.baseX - r.x, wp.baseY - r.y);
                            let age = currentTime - r.time;
                            let speed = 0.4 * cfg.rippleSpeed;
                            let wavefront = age * speed;
                            if (dist < wavefront && dist < r.maxRadius) {
                                let sDamp = Math.exp(-dist * 0.002), tDamp = Math.exp(-age * 0.0005), smooth = Math.min(1, (wavefront - dist) / 60), phase = dist * 0.04 - age * (speed * 0.04), osc = Math.cos(phase), amp = r.strength * cfg.rippleStrength * sDamp * tDamp * smooth, angle = Math.atan2(wp.baseY - r.y, wp.baseX - r.x);
                                dx += Math.cos(angle) * osc * amp; dy += Math.sin(angle) * osc * amp; cIntensity += Math.max(0, osc) * amp * 0.3;
                            }
                        }
                        let alpha = 0.25 + (0.65 * Math.min(1, Math.max(0, Math.pow(cIntensity, 1.2))));
                        ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`; ctx.fillText(wp.text, wp.baseX + dx, wp.baseY + dy);
                    }
                    animationFrameId = requestAnimationFrame(render);
                };
                render();
                return () => { 
                    window.removeEventListener('mousemove', handleMouseMove); 
                    window.removeEventListener('click', handleClick); 
                    canvas.removeEventListener('touchmove', handleTouchMove); 
                    canvas.removeEventListener('touchstart', handleTouchStart); 
                    cancelAnimationFrame(animationFrameId); 
                };
            }, []);

            const Slider = ({ label, field, min, max, step }) => (
                <div className="mb-2 sm:mb-4 pr-1 sm:pr-2">
                    <div className="flex justify-between items-center mb-1">
                        <label className="text-[9px] sm:text-[10px] font-bold uppercase tracking-widest text-gray-500">{label}</label>
                        <span className="text-[9px] sm:text-[10px] font-mono text-gray-400">{config[field].toFixed(2)}</span>
                    </div>
                    <input 
                        type="range" 
                        min={min} 
                        max={max} 
                        step={step} 
                        value={config[field]} 
                        onChange={(e) => setConfig(prev => ({ ...prev, [field]: parseFloat(e.target.value) }))} 
                        className="w-full h-1 sm:h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-black" 
                    />
                </div>
            );

            return (
                <div className="relative w-screen h-screen overflow-hidden bg-white font-serif">
                    <canvas ref={canvasRef} className="block w-full h-full cursor-crosshair" />
                    
                    <button 
                        onClick={() => setIsPanelVisible(!isPanelVisible)} 
                        className="absolute top-5 right-5 sm:top-6 sm:right-6 z-30 px-4 py-1.5 text-[10px] font-bold uppercase tracking-widest border border-gray-200 rounded-full bg-white/80 backdrop-blur-md shadow-sm hover:bg-black hover:text-white transition-all duration-300"
                    >
                        {isPanelVisible ? 'Close' : 'Settings'}
                    </button>

                    {isPanelVisible && (
                        /* MOBILE OPTIMIZED CONTAINER: WIDER ON MOBILE TO FIT THE 2-COLUMN GRID */
                        <div className="settings-panel absolute top-16 sm:top-20 right-4 left-4 sm:left-auto sm:right-6 w-auto sm:w-72 max-h-[85vh] p-4 sm:p-6 bg-white/95 backdrop-blur-xl border border-gray-100 rounded-2xl shadow-2xl z-20 overflow-y-auto pointer-events-auto">
                            
                            <div className="mb-3 sm:mb-6 pr-1 sm:pr-2">
                                <label className="block text-[9px] sm:text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1.5 sm:mb-2">Pool Text</label>
                                <textarea
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    rows={1}
                                    className="w-full text-[11px] font-serif text-gray-700 bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 sm:py-2 resize-y min-h-[36px] outline-none focus:border-gray-400 transition-colors"
                                />
                                <button
                                    onClick={() => setCustomText(inputValue)}
                                    className="mt-1.5 sm:mt-2 w-full py-1.5 sm:py-2 text-[9px] font-black uppercase tracking-widest border border-gray-200 rounded-lg bg-white hover:bg-black hover:text-white transition-all duration-200"
                                >
                                    Update Pool ↵
                                </button>
                            </div>

                            <div className="mb-3 sm:mb-6 pr-1 sm:pr-2">
                                <label className="block text-[9px] sm:text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-0.5">Scatter Phrases</label>
                                <p className="text-[8px] sm:text-[9px] text-gray-400 mb-1.5 sm:mb-2">Separate with commas</p>
                                <textarea
                                    value={randomPhrasesInput}
                                    onChange={(e) => setRandomPhrasesInput(e.target.value)}
                                    rows={1}
                                    className="w-full text-[11px] font-serif text-gray-700 bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 sm:py-2 resize-y min-h-[36px] outline-none focus:border-gray-400 transition-colors"
                                />
                                <button
                                    onClick={() => setRandomPhrases(randomPhrasesInput)}
                                    className="mt-1.5 sm:mt-2 w-full py-1.5 sm:py-2 text-[9px] font-black uppercase tracking-widest border border-gray-200 rounded-lg bg-white hover:bg-black hover:text-white transition-all duration-200"
                                >
                                    Scatter ↵
                                </button>
                            </div>

                            <div className="border-t border-gray-100 pt-3 sm:pt-5">
                                <h3 className="text-[9px] font-black uppercase tracking-widest text-gray-400 mb-2 sm:mb-4">Parameters</h3>
                                <div className="grid grid-cols-2 sm:grid-cols-1 gap-x-4 gap-y-0">
                                    <Slider label="Line Height" field="lineHeight" min="10" max="40" step="1" />
                                    <Slider label="Ambient Speed" field="ambientSpeed" min="0" max="3" step="0.05" />
                                    <Slider label="Ambient Drift" field="ambientDrift" min="0" max="10" step="0.1" />
                                    <Slider label="Ink Density" field="causticIntensity" min="0" max="5" step="0.1" />
                                    <Slider label="Ripple Speed" field="rippleSpeed" min="0.1" max="3" step="0.05" />
                                    <Slider label="Ripple Strength" field="rippleStrength" min="0" max="5" step="0.05" />
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="absolute bottom-6 left-6 pointer-events-none hidden sm:block">
                        <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-300">The Future of Text Layout is not CSS</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
