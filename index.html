<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Danqi Qian - Creative Text Layout</title>
   
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
   
    <!-- Babel for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
   
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #ffffff;
        }
        /* Prevents pull-to-refresh on mobile */
        #root {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useRef, useEffect, useState, useMemo } = React;

        const Slider = ({ label, value, min, max, step, onChange }) => (
          <div className="mb-1.5 sm:mb-3">
            <div className="flex justify-between items-center mb-0.5 sm:mb-1">
              <label className="text-[9px] sm:text-[10px] font-bold uppercase tracking-widest text-gray-500">{label}</label>
              <span className="text-[9px] sm:text-[10px] font-mono text-gray-400">{Number(value).toFixed(2)}</span>
            </div>
            <input
              type="range" min={min} max={max} step={step}
              value={value}
              onChange={onChange}
              className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-black"
            />
          </div>
        );

        function UserlandTextArt() {
          const canvasRef = useRef(null);
         
          const [isPanelVisible, setIsPanelVisible] = useState(false);
          const [isPretextLoaded, setIsPretextLoaded] = useState(false);

          const [textConfig, setTextConfig] = useState({
            main: "Danqi Qian is good at creating stuff, follow her X @ohhdanqi if you like this!",
            scatter: "Follow @ohhdanqi!"
          });

          const [config, setConfig] = useState({
            lineHeight: 17.00,
            ambientSpeed: 0.20,
            ambientDrift: 4.10,
            causticIntensity: 1.90,
            rippleSpeed: 0.70,
            rippleStrength: 0.20
          });

          const configRef = useRef(config);
          useEffect(() => { configRef.current = config; }, [config]);

          const wordPositionsRef = useRef([]);

          // --- BYPASS BUNDLER & LOAD PRETEXT LIBRARY ---
          useEffect(() => {
            try {
              const loadPretext = new Function(`return import('https://esm.sh/@chenglou/pretext@0.0.4')`);
             
              loadPretext().then(mod => {
                window.Pretext = mod;
                setIsPretextLoaded(true);
              }).catch(err => console.error("Failed to load Pretext via CDN", err));
            } catch(e) {
              console.error("Dynamic import not supported in this browser version", e);
            }
          }, []);

          // --- DYNAMIC TEXT GENERATION ---
          const fullRawText = useMemo(() => {
            const scatterItems = textConfig.scatter.split(',').map(s => s.trim()).filter(Boolean);
            let combined = '';
           
            for (let i = 0; i < 150; i++) {
              combined += textConfig.main + ' ';
              if (scatterItems.length > 0 && Math.random() < 0.20) {
                const randomScatter = scatterItems[Math.floor(Math.random() * scatterItems.length)];
                combined += randomScatter + ' ';
              }
            }
            return combined;
          }, [textConfig.main, textConfig.scatter]);


          // --- LAYOUT PHASE ---
          useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
           
            const resizeAndLayout = () => {
              const width = window.innerWidth;
              const height = window.innerHeight;
              const dpr = window.devicePixelRatio || 1;
             
              canvas.width = width * dpr;
              canvas.height = height * dpr;
              ctx.scale(dpr, dpr);

              const margin = 20;
              const fontStr = '15px "Times New Roman", serif';
              ctx.font = fontStr;
             
              const maxWidth = width - (margin * 2);
              const currentLineHeight = configRef.current.lineHeight;

              let newPositions = [];

              if (window.Pretext && window.Pretext.prepareWithSegments) {
                const preparedData = window.Pretext.prepareWithSegments(fullRawText, fontStr);
                const layoutResult = window.Pretext.layoutWithLines(preparedData, maxWidth, currentLineHeight);
               
                for (let i = 0; i < layoutResult.lines.length; i++) {
                  const lineY = margin + 20 + (i * currentLineHeight);
                  if (lineY > height - margin) break;
                 
                  const words = layoutResult.lines[i].text.split(' ');
                  let currentX = margin;
                 
                  for (let word of words) {
                    if (!word) continue;
                    newPositions.push({ text: word, baseX: currentX, baseY: lineY });
                    currentX += ctx.measureText(word + ' ').width;
                  }
                }
              } else {
                let x = margin;
                let y = margin + 20;
                const words = fullRawText.split(' ');
                const spaceW = ctx.measureText(' ').width;

                for (let word of words) {
                  const w = ctx.measureText(word).width;
                  if (x + w > width - margin) {
                    x = margin;
                    y += currentLineHeight;
                  }
                  if (y > height - margin) break;
                  newPositions.push({ text: word, baseX: x, baseY: y });
                  x += w + spaceW;
                }
              }
             
              wordPositionsRef.current = newPositions;
            };

            window.addEventListener('resize', resizeAndLayout);
            resizeAndLayout();
            return () => window.removeEventListener('resize', resizeAndLayout);
          }, [config.lineHeight, fullRawText, isPretextLoaded]);

          // --- RENDER & PHYSICS PHASE ---
          useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let animationFrameId;
           
            const ripples = [];
            let lastX = -1000;
            let lastY = -1000;

            const createRipple = (x, y, strength, maxRadius) => {
              ripples.push({ x, y, time: performance.now(), strength, maxRadius });
            };

            const handleMove = (x, y) => {
              const dist = Math.hypot(x - lastX, y - lastY);
              if (dist > 40) {
                createRipple(x, y, 8, 300);
                lastX = x;
                lastY = y;
              }
            };

            const onMouseMove = (e) => handleMove(e.clientX, e.clientY);
            const onTouchMove = (e) => {
              if (e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY);
            };

            const onClick = (e) => createRipple(e.clientX, e.clientY, 35, 1200);
            const onTouchStart = (e) => {
              if (e.touches.length > 0) createRipple(e.touches[0].clientX, e.touches[0].clientY, 35, 1200);
            };

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('touchmove', onTouchMove, { passive: true });
            window.addEventListener('click', onClick);
            window.addEventListener('touchstart', onTouchStart, { passive: true });

            const render = () => {
              const currentTime = performance.now();
              const cfg = configRef.current;
              const dpr = window.devicePixelRatio || 1;
              const w = canvas.width / dpr;
              const h = canvas.height / dpr;

              ctx.fillStyle = '#ffffff';
              ctx.fillRect(0, 0, w, h);

              while (ripples.length > 0 && currentTime - ripples[0].time > 8000) ripples.shift();

              const positions = wordPositionsRef.current;
              ctx.font = '15px "Times New Roman", serif';
              ctx.textBaseline = 'middle';

              for (let i = 0; i < positions.length; i++) {
                let wp = positions[i];
                let dx = 0;
                let dy = 0;
                let cIntensity = 0;

                const timeScale = currentTime * 0.0004 * cfg.ambientSpeed;
                let w1 = Math.sin(wp.baseX * 0.003 + timeScale);
                let w2 = Math.sin((wp.baseX * 0.004 + wp.baseY * 0.003) - (timeScale * 1.25));
                let w3 = Math.cos(wp.baseY * 0.002 + (timeScale * 1.5));
               
                let combined = w1 + w2 + w3;
                cIntensity += Math.pow(Math.sin(combined * 0.5), 4) * 1.2 * cfg.causticIntensity;

                dx += w1 * 0.8 * cfg.ambientDrift;
                dy += w3 * 0.8 * cfg.ambientDrift;

                for (let r of ripples) {
                  let dist = Math.hypot(wp.baseX - r.x, wp.baseY - r.y);
                  let age = currentTime - r.time;
                  let speed = 0.4 * cfg.rippleSpeed;
                  let wavefront = age * speed;

                  if (dist < wavefront && dist < r.maxRadius) {
                    let sDamp = Math.exp(-dist * 0.002);
                    let tDamp = Math.exp(-age * 0.0005);    
                    let smooth = Math.min(1, (wavefront - dist) / 60);
                    let phase = dist * 0.04 - age * (speed * 0.04);
                    let osc = Math.cos(phase);
                    let amp = r.strength * cfg.rippleStrength * sDamp * tDamp * smooth;
                    let angle = Math.atan2(wp.baseY - r.y, wp.baseX - r.x);
                   
                    dx += Math.cos(angle) * osc * amp;
                    dy += Math.sin(angle) * osc * amp;
                    cIntensity += Math.max(0, osc) * amp * 0.3;
                  }
                }

                let alpha = 0.25 + (0.65 * Math.min(1, Math.max(0, Math.pow(cIntensity, 1.2))));
                ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
                ctx.fillText(wp.text, wp.baseX + dx, wp.baseY + dy);
              }

              animationFrameId = requestAnimationFrame(render);
            };

            render();

            return () => {
              window.removeEventListener('mousemove', onMouseMove);
              window.removeEventListener('touchmove', onTouchMove);
              window.removeEventListener('click', onClick);
              window.removeEventListener('touchstart', onTouchStart);
              cancelAnimationFrame(animationFrameId);
            };
          }, []);

          return (
            <div className="relative w-screen h-screen overflow-hidden bg-white font-serif">
              <canvas ref={canvasRef} className="block w-full h-full cursor-crosshair touch-none" />
             
              <button
                onClick={() => setIsPanelVisible(!isPanelVisible)}
                className="absolute top-4 right-4 sm:top-6 sm:right-6 z-20 px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-gray-200 rounded-full bg-white/50 backdrop-blur hover:bg-black hover:text-white transition-all duration-300"
              >
                {isPanelVisible ? 'Close' : 'Settings'}
              </button>
             
              {isPanelVisible && (
                <div className="absolute top-12 right-2 left-2 sm:top-16 sm:left-auto sm:right-6 sm:w-72 p-3 sm:p-5 bg-white/95 backdrop-blur-xl border border-gray-100 rounded-2xl shadow-2xl z-10 pointer-events-auto max-h-[90vh] overflow-y-auto flex flex-col gap-2 sm:gap-4">
                 
                  <div className="">
                    <label className="block text-[9px] sm:text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1">Pool Text</label>
                    <textarea
                      value={textConfig.main}
                      onChange={(e) => setTextConfig(prev => ({...prev, main: e.target.value}))}
                      className="w-full text-[10px] sm:text-xs p-1.5 sm:p-2 border border-gray-200 rounded bg-gray-50 text-black resize-none outline-none focus:border-black leading-tight"
                      rows={2}
                    />
                  </div>

                  <div className="">
                    <label className="block text-[9px] sm:text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1">Scatter Sentences</label>
                    <textarea
                      value={textConfig.scatter}
                      onChange={(e) => setTextConfig(prev => ({...prev, scatter: e.target.value}))}
                      className="w-full text-[10px] sm:text-xs p-1.5 sm:p-2 border border-gray-200 rounded bg-gray-50 text-black resize-none outline-none focus:border-black leading-tight"
                      rows={1}
                    />
                  </div>

                  <div className="mt-1">
                    <h2 className="text-[9px] sm:text-[10px] font-black mb-2 sm:mb-4 uppercase tracking-widest border-b border-gray-100 pb-1 sm:pb-2">Physics Parameters</h2>
                   
                    <Slider label="Line Height" min={10} max={40} step={1} value={config.lineHeight}
                      onChange={(e) => setConfig(prev => ({ ...prev, lineHeight: parseFloat(e.target.value) }))} />
                   
                    <Slider label="Ambient Speed" min={0} max={3} step={0.05} value={config.ambientSpeed}
                      onChange={(e) => setConfig(prev => ({ ...prev, ambientSpeed: parseFloat(e.target.value) }))} />
                   
                    <Slider label="Ambient Drift" min={0} max={10} step={0.1} value={config.ambientDrift}
                      onChange={(e) => setConfig(prev => ({ ...prev, ambientDrift: parseFloat(e.target.value) }))} />
                     
                    <Slider label="Ink Density" min={0} max={5} step={0.1} value={config.causticIntensity}
                      onChange={(e) => setConfig(prev => ({ ...prev, causticIntensity: parseFloat(e.target.value) }))} />
                     
                    <Slider label="Ripple Speed" min={0.1} max={3} step={0.05} value={config.rippleSpeed}
                      onChange={(e) => setConfig(prev => ({ ...prev, rippleSpeed: parseFloat(e.target.value) }))} />
                     
                    <Slider label="Ripple Strength" min={0} max={5} step={0.05} value={config.rippleStrength}
                      onChange={(e) => setConfig(prev => ({ ...prev, rippleStrength: parseFloat(e.target.value) }))} />
                  </div>
                </div>
              )}

              <div className="absolute bottom-6 left-6 pointer-events-none">
                <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-300">
                  Made by Danqi Qian @ohhdanqi
                </p>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UserlandTextArt />);
    </script>
</body>
</html>
